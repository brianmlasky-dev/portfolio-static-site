name: Deploy Portfolio to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::229502947368:role/github-portfolio-deploy-role
          aws-region: us-east-1

      - name: Deploy static site to S3
        run: |
          aws s3 sync . s3://brianmlasky-portfolio-dev \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".terraform/*" \
            --exclude "*.tf" \
            --exclude "*.tfvars" \
            --exclude "*.hcl" \
            --exclude ".gitignore" \
            --exclude "README.md"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2H3FTK4KRZNQE \
            --paths "/*"
