name: Deploy to S3 & CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::229502947368:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Sync Website Assets to S3
        run: |
          aws s3 sync . s3://brianmlasky-portfolio-dev \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".terraform/*" \
            --exclude "*.tfstate*" \
            --exclude "*.tfvars" \
            --exclude "*.tf" \
            --exclude ".terraform.lock.hcl" \
            --exclude ".gitignore" \
            --exclude "README.md"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id d2dzak3y5t0it9 \
            --paths "/*"

      - name: Deployment Status
        run: |
          echo "✅ Website deployed to https://brian-lasky.com"
          echo "📊 Distribution: d2dzak3y5t0it9"
          echo "🔄 Cache invalidation complete"
